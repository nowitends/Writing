name: Update tree.txt

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "tree.txt"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: update-tree-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-tree:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}

      - name: Regenerate tree.txt
        run: |
          find . \
            -path ./.git -prune -o \
            -name '*.log' -prune -o \
            -name '*.aux' -prune -o \
            -name '*.out' -prune -o \
            -name '*.toc' -prune -o \
            -name '*.fls' -prune -o \
            -name '*.fdb_latexmk' -prune -o \
            -name '*.synctex.gz' -prune -o \
            -print | sort > tree.txt

      - name: Commit tree.txt if changed
        run: |
          if git diff --quiet -- tree.txt; then
            echo "tree.txt is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tree.txt
          git commit -m "Update tree.txt"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
