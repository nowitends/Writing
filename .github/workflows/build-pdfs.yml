name: Build lecture PDFs

on:
  push:
    branches:
      - "**"
    paths:
      - ".github/workflows/build-pdfs.yml"
      - "shared/**/*.tex"
      - "mathematical_lectures/**/*.tex"
      - "mathematical_lectures/**/build.sh"
      - "physics_lectures/**/*.tex"
      - "physics_lectures/**/build.sh"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-pdfs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Detect projects to build
        id: detect
        run: |
          all_projects=(
            "mathematical_lectures/basic_mathematics"
            "mathematical_lectures/probabilistic_methods"
            "mathematical_lectures/general_notes_experiments"
            "physics_lectures/physics_basics"
            "physics_lectures/general_notes_experiments"
          )

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ "${before}" =~ ^0+$ ]]; then
            changed_files="$(git ls-tree -r --name-only "${after}")"
          else
            changed_files="$(git diff --name-only "${before}" "${after}")"
          fi

          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          build_all=false
          if printf '%s\n' "${changed_files}" | grep -Eq '^shared/|^\.github/workflows/build-pdfs\.yml$'; then
            build_all=true
          fi

          if [[ "${build_all}" == "true" ]]; then
            projects=("${all_projects[@]}")
          else
            projects=()
            for project in "${all_projects[@]}"; do
              if printf '%s\n' "${changed_files}" | grep -Eq "^${project}/"; then
                projects+=("${project}")
              fi
            done
          fi

          if [[ "${#projects[@]}" -eq 0 ]]; then
            echo "No project needs rebuilding."
            echo "projects=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf 'Projects to build:\n'
          printf '%s\n' "${projects[@]}"
          echo "projects=${projects[*]}" >> "${GITHUB_OUTPUT}"

      - name: Build changed lecture PDFs
        if: steps.detect.outputs.projects != ''
        uses: xu-cheng/texlive-action@v3
        env:
          PROJECTS_TO_BUILD: ${{ steps.detect.outputs.projects }}
        with:
          texlive_version: latest
          run: |
            read -r -a projects <<< "${PROJECTS_TO_BUILD}"

            for project in "${projects[@]}"; do
              echo "Building ${project}"
              if [[ ! -x "${project}/build.sh" ]]; then
                echo "Missing executable build script: ${project}/build.sh" >&2
                exit 1
              fi
              "${project}/build.sh"
            done

      - name: Commit changed PDFs
        if: steps.detect.outputs.projects != ''
        env:
          PROJECTS_TO_BUILD: ${{ steps.detect.outputs.projects }}
        run: |
          read -r -a projects <<< "${PROJECTS_TO_BUILD}"

          changed=()
          for project in "${projects[@]}"; do
            pdf="${project}/main.pdf"
            if ! git diff --quiet -- "${pdf}"; then
              changed+=("${pdf}")
            fi
          done

          if [[ "${#changed[@]}" -eq 0 ]]; then
            echo "All PDFs are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${changed[@]}"
          git commit -m "Build lecture PDFs"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
